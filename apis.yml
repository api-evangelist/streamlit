aid: streamlit
name: Streamlit
description: >-
  Streamlit is an open-source Python framework that makes it easy to build
  and share beautiful, custom web apps for machine learning and data science.
  With Streamlit, you can turn data scripts into shareable web applications
  in minutes without needing front-end experience. Streamlit Community Cloud
  provides free hosting for Streamlit apps directly from GitHub repositories.
  The framework offers a Python API for displaying data, creating interactive
  widgets, caching computation, and connecting to databases and APIs.
url: >-
  https://raw.githubusercontent.com/api-evangelist/streamlit/refs/heads/main/apis.yml
image: https://streamlit.io/images/brand/streamlit-mark-color.png
tags:
  - Data Science
