apis:
  - aid: streamlit:streamlit-python-api
    name: Streamlit Python API
    description: >-
      The Streamlit Python library API provides a rich set of functions for
      building interactive data applications. Organized by activity type:
      display data (st.write, st.dataframe, st.table), input widgets
      (st.button, st.slider, st.selectbox), layout (st.columns, st.tabs,
      st.sidebar), media (st.image, st.video, st.audio), charts
      (st.line_chart, st.bar_chart, st.map), and performance (st.cache_data,
      st.cache_resource). Also includes connection management via st.connection.
    humanURL: https://docs.streamlit.io/develop/api-reference
    tags:
      - Data Science
      - Machine Learning
      - Open Source
      - Python
      - Web Applications
    properties:
      - type: Documentation
        url: https://docs.streamlit.io/develop/api-reference
      - type: GitHub
        url: https://github.com/streamlit/streamlit
      - type: Changelog
        url: https://docs.streamlit.io/develop/quick-reference/changelog
  - aid: streamlit:streamlit-cloud-api
    name: Streamlit Community Cloud API
    description: >-
      The Streamlit Community Cloud API provides programmatic access to manage
      deployed Streamlit applications. Supports deploying apps from GitHub
      repositories, managing app secrets, restarting apps, and workspace
      management. Authentication uses bearer tokens issued from account settings.
    humanURL: https://docs.streamlit.io/deploy/streamlit-community-cloud
    baseURL: https://api.streamlit.io/v1
    tags:
      - Cloud
      - Deployment
      - DevOps
      - Open Source
    properties:
      - type: OpenAPI
        url: >-
          https://raw.githubusercontent.com/api-evangelist/streamlit/refs/heads/main/openapi/streamlit-cloud-openapi.yml
      - type: Documentation
        url: https://docs.streamlit.io/deploy/streamlit-community-cloud/manage-your-app
