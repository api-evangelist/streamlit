naftiko: "1.0.0-alpha1"

info:
  label: "Streamlit Community Cloud API"
  description: >-
    Streamlit Community Cloud API for managing deployed Streamlit applications.
    Deploy apps from GitHub, manage secrets, restart apps, and manage workspaces.
  tags:
    - Cloud
    - Data Science
    - Deployment
    - Open Source
    - Python
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      STREAMLIT_API_TOKEN: STREAMLIT_API_TOKEN

capability:
  consumes:
    - type: http
      namespace: streamlit-cloud
      baseUri: https://api.streamlit.io/v1
      description: "Streamlit Community Cloud API"
      authentication:
        type: bearer
        token: "{{STREAMLIT_API_TOKEN}}"
      resources:
        - name: apps
          path: /apps
          description: "Streamlit app management"
          operations:
            - name: list-apps
              method: GET
              description: "List all Streamlit apps in the workspace"
              inputParameters:
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number"
                - name: per_page
                  in: query
                  type: integer
                  required: false
                  description: "Apps per page"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: deploy-app
              method: POST
              description: "Deploy a new app from a GitHub repository"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  repo: "{{tools.repo}}"
                  branch: "{{tools.branch}}"
                  mainFile: "{{tools.mainFile}}"
                  appName: "{{tools.appName}}"
        - name: app
          path: /apps/{appId}
          description: "Single app operations"
          operations:
            - name: get-app
              method: GET
              description: "Get details of a specific app"
              inputParameters:
                - name: appId
                  in: path
                  type: string
                  required: true
                  description: "The app identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-app
              method: DELETE
              description: "Delete a deployed app"
              inputParameters:
                - name: appId
                  in: path
                  type: string
                  required: true
                  description: "The app identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: app-restart
          path: /apps/{appId}/restart
          description: "App restart operation"
          operations:
            - name: restart-app
              method: POST
              description: "Restart a deployed app"
              inputParameters:
                - name: appId
                  in: path
                  type: string
                  required: true
                  description: "The app identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: app-secrets
          path: /apps/{appId}/secrets
          description: "App secrets management"
          operations:
            - name: get-app-secrets
              method: GET
              description: "Get secret key names for an app (values not returned)"
              inputParameters:
                - name: appId
                  in: path
                  type: string
                  required: true
                  description: "The app identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-app-secrets
              method: PUT
              description: "Update secrets for an app (TOML format)"
              inputParameters:
                - name: appId
                  in: path
                  type: string
                  required: true
                  description: "The app identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  secrets: "{{tools.secrets}}"
        - name: workspaces
          path: /workspaces
          description: "Workspace management"
          operations:
            - name: list-workspaces
              method: GET
              description: "List accessible workspaces"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: streamlit-cloud-rest-api
      resources:
        - path: /v1/apps
          name: apps
          description: "App management"
          operations:
            - method: GET
              name: list-apps
              description: "List Streamlit apps"
              call: "streamlit-cloud.list-apps"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: deploy-app
              description: "Deploy a new app"
              call: "streamlit-cloud.deploy-app"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/apps/{appId}
          name: app
          description: "Single app management"
          operations:
            - method: GET
              name: get-app
              description: "Get app details"
              call: "streamlit-cloud.get-app"
              with:
                appId: "rest.appId"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: DELETE
              name: delete-app
              description: "Delete an app"
              call: "streamlit-cloud.delete-app"
              with:
                appId: "rest.appId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: streamlit-cloud-mcp
      transport: http
      tools:
        - name: list-apps
          description: "List all Streamlit apps in the workspace"
          hints:
            readOnly: true
            openWorld: true
          call: "streamlit-cloud.list-apps"
          outputParameters:
            - type: object
              mapping: "$."
        - name: deploy-app
          description: "Deploy a new Streamlit app from a GitHub repository"
          hints:
            readOnly: false
          call: "streamlit-cloud.deploy-app"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-app
          description: "Get details and status of a specific Streamlit app"
          hints:
            readOnly: true
          call: "streamlit-cloud.get-app"
          with:
            appId: "tools.appId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-app
          description: "Delete a deployed Streamlit app"
          hints:
            readOnly: false
            destructive: true
          call: "streamlit-cloud.delete-app"
          with:
            appId: "tools.appId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: restart-app
          description: "Restart a Streamlit app (useful after updating secrets)"
          hints:
            readOnly: false
          call: "streamlit-cloud.restart-app"
          with:
            appId: "tools.appId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-app-secrets
          description: "Get the list of secret key names configured for an app"
          hints:
            readOnly: true
          call: "streamlit-cloud.get-app-secrets"
          with:
            appId: "tools.appId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: update-app-secrets
          description: "Update app secrets in TOML format"
          hints:
            readOnly: false
            idempotent: true
          call: "streamlit-cloud.update-app-secrets"
          with:
            appId: "tools.appId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-workspaces
          description: "List accessible Streamlit workspaces"
          hints:
            readOnly: true
          call: "streamlit-cloud.list-workspaces"
          outputParameters:
            - type: object
              mapping: "$."
